spring.application.name=visualops
server.port=${PORT:9090}
spring.config.import=optional:file:.env[.properties]

# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/visualopsdb?sslMode=DISABLED&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173}

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.axion11.visualops=DEBUG
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

logging.file.name=spring-debug.log

# Google Cloud Storage
gcs.bucket.name=${GCS_BUCKET_NAME:axion11-assets}

# Gemini API for image tagging
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# Multipart upload limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=2GB

# Tomcat POST and swallow limits
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1

# Stream large files to temp disk instead of holding in memory
spring.servlet.multipart.file-size-threshold=10MB

# Google Drive OAuth2
google.drive.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
google.drive.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
google.drive.redirect-uri=${GOOGLE_DRIVE_REDIRECT_URI:http://localhost:3000/oauth/callback/google}

# Google Picker — separate API key (not the OAuth client secret) used client-side to render
# the native Drive file/folder picker. Create one in Cloud Console > APIs & Services > Credentials.
google.picker.api-key=${GOOGLE_PICKER_API_KEY:}

# Google Sign-In (SSO) — reuses Google Drive client_id/secret, separate redirect URI
google.signin.redirect-uri=${GOOGLE_SIGNIN_REDIRECT_URI:http://localhost:3000/oauth/callback/google-signin}

# Google Sign-In for the packaged desktop app — its own "Desktop app" type OAuth client
# (supports arbitrary-port loopback redirects). It verifies with Google itself and hands us
# an ID token instead of a code. Leave unset to disable desktop Google sign-in.
google.desktop.client-id=${GOOGLE_DESKTOP_CLIENT_ID:}

# OneDrive OAuth2 (Microsoft Graph)
onedrive.client-id=${ONEDRIVE_CLIENT_ID:}
onedrive.client-secret=${ONEDRIVE_CLIENT_SECRET:}
onedrive.redirect-uri=${ONEDRIVE_REDIRECT_URI:http://localhost:3000/oauth/callback/onedrive}
onedrive.tenant-id=${ONEDRIVE_TENANT_ID:common}

# OAuth token encryption key (Base64-encoded 32 bytes). If unset, an ephemeral key is generated.
oauth.token.encryption-key=${OAUTH_TOKEN_ENCRYPTION_KEY:3q2b4P1V7v8s9B0C1D2E3F4G5H6I7J8K9L0M1N2O3P4=}

# Email notification (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:alailabssg@gmail.com}
spring.mail.password=${MAIL_PASSWORD:bxfidntpdxppcqso}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
error.notification.to=${ERROR_NOTIFY_EMAIL:murali@alai-labs.com}

# Demo seeding — set SEED_DEMO_DATA=false in production to skip test users/data
app.seed.demo=${SEED_DEMO_DATA:false}
